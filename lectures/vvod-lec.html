<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Вводная лекция. Роль вожатого в лагере</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../style.css">
  <script src="../theme.js" defer></script>

  <!-- index / personas -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const params = new URLSearchParams(window.location.search);
      const from = params.get('from');

      // по умолчанию — с главной
      let targetHref = '../index.html';
      let backText   = '← Назад к лекциям';

      // если пришли со страницы "Команда и лекторы"
      if (from === 'personas') {
        targetHref = 'personas.html';   // т.к. файл в той же папке /lectures
        backText   = '← Назад';
      }

      const closeBtn = document.querySelector('.close-card-btn');
      const backBtn  = document.querySelector('.lecture-footer .btn');

      if (closeBtn) {
        closeBtn.href = targetHref;
      }
      if (backBtn) {
        backBtn.href = targetHref;
        backBtn.textContent = backText;
      }
    });
  </script>
</head>

<body>
  <!-- переключатель темы -->
  <button id="theme-toggle" aria-label="Переключить тему">🌙 Тёмная тема</button>

  <!-- карточка лекции с крестиком -->
  <article class="card lecture-card">
    <a class="close-card-btn" href="../index.html" aria-label="Назад к списку">
      <svg class="close-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <line x1="6" y1="6" x2="18" y2="18" />
        <line x1="18" y1="6" x2="6" y2="18" />
      </svg>
    </a>

    <div class="content">
      <h1>ВВОДНАЯ ЛЕКЦИЯ. РОЛЬ ВОЖАТОГО В ЛАГЕРЕ</h1>
      <h2>Данная лекция неповторима и невоспроизводима.</h2>
      <h2>Конспекта здесь нет и не будет. Верим, что вы слушали внимательно.</h2>
      <h2>Материалы лекции можно посмотреть, нажав на кнопку «⬇ Скачать материалы»</h2>
      <div class="lecture-footer">
        <a class="btn" href="../index.html">← Назад к лекциям</a>

        <a
          class="btn btn-download"
          href="../assets/lecs/vvod-lec/vvod-lec.pdf"
          download
        >
          ⬇ Скачать материалы
        </a>
      </div>
    </div>
  </article>

<!-- защита от локального просмотра -->
<script src="../protect-local.js?v=7" data-lecture-id="vvod-lec"></script>
</body>
</html>
