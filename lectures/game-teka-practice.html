<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Игротека. 1 Часть. Практика</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../style.css">
  <script src="../theme.js" defer></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const params = new URLSearchParams(window.location.search);
      const from = params.get('from');

      let targetHref = '../index.html';
      let backText   = '← Назад к лекциям';

      if (from === 'personas') {
        targetHref = 'personas.html';
        backText   = '← Назад';
      }

      const closeBtn = document.querySelector('.close-card-btn');
      const backBtn  = document.querySelector('.lecture-footer .btn');

      if (closeBtn) {
        closeBtn.href = targetHref;
      }
      if (backBtn) {
        backBtn.href = targetHref;
        backBtn.textContent = backText;
      }
    });
  </script>
</head>

<body>
  <!-- переключатель темы -->
  <button id="theme-toggle" aria-label="Переключить тему">🌙 Тёмная тема</button>

  <!-- карточка лекции с крестиком -->
  <article class="card lecture-card">
    <a class="close-card-btn" href="../index.html" aria-label="Назад к списку">
      <svg class="close-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <line x1="6" y1="6" x2="18" y2="18" />
        <line x1="18" y1="6" x2="6" y2="18" />
      </svg>
    </a>

    <div class="content">
<h1>Игротека. 1 Часть. Практика</h1>
      <h2>А что вы хотели здесь увидеть? :)</h2>
      <h2>Это же практика, вы чего...</h2>

    <div class="lecture-footer">
      <a class="btn" href="../index.html">← Назад к лекциям</a>
      </div>
    </div>
  </article>

  <!-- защита от локального просмотра -->
<script src="../protect-local.js?v=7" data-lecture-id="game-teka-practice"></script>
</body>
</html>
